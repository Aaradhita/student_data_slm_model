<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Support Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-pKC5e5G7V/3x4Zz+g+Yf2aSOZoI4o7/V3i7EyCqty+FTdE6Kce4pGzNfT33GPn7Kf9L5BlZ+G3y0j4cIVzjkwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="/static/style.css">


</head>

<body>

<div class="chat-container">
    <div class="sidebar-contacts">
        <div class="contact active">
            <img src="https://via.placeholder.com/40" />
            <span>DEMO001</span>
        </div>
        <div class="contact">
            <img src="https://via.placeholder.com/40" />
            <span>DEMO002</span>
        </div>
        <!-- more contacts can be added dynamically -->
    </div>

    <div class="main-chat">
        <header class="chat-header">
            <div class="user-info">
                <img src="https://via.placeholder.com/40" />
                <div>
                    <div class="name">Student Support</div>
                    <div class="status">online</div>
                </div>
            </div>
        </header>

        <div class="chat-box" id="chat"></div>

        <div class="input-area">
            <input type="text" id="message" placeholder="Type your message..."
                   onkeydown="if (event.key === 'Enter') sendMessage();">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>
</div>

<script>
function suggestNames() {
    const nameInput = document.getElementById("name");
    const regInput = document.getElementById("reg");
    const query = nameInput.value;
    const suggestionBox = document.getElementById("suggestions");

    if (query.length < 2) {
        suggestionBox.innerHTML = "";
        return;
    }

    fetch(`/students/search?query=${encodeURIComponent(query)}`)
        .then(response => response.json())
        .then(data => {
            suggestionBox.innerHTML = "";
            data.forEach(item => {
                const div = document.createElement("div");
                div.textContent = item.name;   // ✅ IMPORTANT
                div.style.cursor = "pointer";
                div.onclick = function () {
                    nameInput.value = item.name;
                    regInput.value = item.register;
                    suggestionBox.innerHTML = "";
                };
                suggestionBox.appendChild(div);
            });
        });
}

function formatTime(dt){
    const d=new Date(dt);
    return d.getHours().toString().padStart(2,'0')+ ':'+ d.getMinutes().toString().padStart(2,'0');
}
function sendMessage() {
    const msgInput = document.getElementById("message");
    const msg = msgInput.value.trim();
    const name = document.getElementById("name").value.trim();
    const reg = document.getElementById("reg").value.trim();

    if (msg === "") return;

    const chatBox = document.getElementById("chat");
    const now = formatTime(new Date());
    chatBox.innerHTML += `<div class="message user"><div class="avatar"></div><div>${msg}<div class="time">${now}</div></div></div>`;
    chatBox.scrollTop = chatBox.scrollHeight;

    fetch(`/chat?message=${encodeURIComponent(msg)}&student_name=${encodeURIComponent(name)}&register_number=${encodeURIComponent(reg)}`)
        .then(res => res.json())
        .then(data => {
            const time = formatTime(new Date());
            chatBox.innerHTML += `<div class="message bot"><div class="avatar"></div><div>${data.reply}<div class="time">${time}</div></div></div>`;
            chatBox.scrollTop = chatBox.scrollHeight;
        });

    msgInput.value = "";
}


</script>


</body>
</html>
